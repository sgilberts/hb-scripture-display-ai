name: Build DeepSpeech native bindings

on:
  workflow_dispatch: {}

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    env:
      ELECTRON_VERSION: '35.5.1'
      TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Rebuild deepspeech native binding (Linux x64)
        run: |
          set -euo pipefail
          echo "ELECTRON_VERSION=$ELECTRON_VERSION"
          echo "TARGET_ARCH=$TARGET_ARCH"
          # Force build-from-source for the native binding against Electron headers
          npm_config_build_from_source=true \
            npm_config_runtime=electron \
            npm_config_target=$ELECTRON_VERSION \
            npm_config_arch=$TARGET_ARCH \
            npm_config_disturl=https://electronjs.org/headers \
            npm rebuild deepspeech --loglevel verbose
          # Ensure electron-rebuild produces the correct node-abi folder (node-v137 for Electron v35)
          npx electron-rebuild -f -w deepspeech --version $ELECTRON_VERSION || true
      - name: Package artifact
        run: |
          set -euo pipefail
          # Prefer packaging the specific node-abi folder node-v137 if present
          BINDING_ROOT=node_modules/deepspeech/lib/binding/v0.9.3
          if [ ! -d "$BINDING_ROOT" ]; then echo "Binding root not found: $BINDING_ROOT"; ls -la node_modules/deepspeech || true; exit 1; fi
          # If node-v137 exists, package only that; otherwise package entire v0.9.3 folder
          if [ -d "$BINDING_ROOT/node-v137" ]; then
            tar czf deepspeech-linux-x64-node-v137.tgz -C "$BINDING_ROOT" node-v137
          else
            tar czf deepspeech-linux-x64.tgz -C node_modules/deepspeech/lib/binding v0.9.3
          fi
          echo "Created artifacts:"
          ls -la deepspeech-*.tgz || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepspeech-linux-x64
          path: |
            deepspeech-linux-x64-node-v137.tgz
            deepspeech-linux-x64.tgz

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      ELECTRON_VERSION: '35.5.1'
      TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Rebuild deepspeech native binding (Windows x64)
        shell: bash
        run: |
          set -euo pipefail
          echo "ELECTRON_VERSION=$ELECTRON_VERSION"
          echo "TARGET_ARCH=$TARGET_ARCH"
          npm_config_build_from_source=true \
            npm_config_runtime=electron \
            npm_config_target=$ELECTRON_VERSION \
            npm_config_arch=$TARGET_ARCH \
            npm_config_disturl=https://electronjs.org/headers \
            npm rebuild deepspeech --loglevel verbose
          npx electron-rebuild -f -w deepspeech --version $ELECTRON_VERSION || true
      - name: Package artifact (zip)
        shell: powershell
        run: |
          $bindingRoot = 'node_modules\\deepspeech\\lib\\binding\\v0.9.3'
          if (-not (Test-Path $bindingRoot)) { Write-Error "Binding root not found: $bindingRoot"; exit 1 }
          # If a node-abi folder for node-v137 exists, package it specifically
          $nodeFolder = Join-Path $bindingRoot 'node-v137'
          if (Test-Path $nodeFolder) {
            Compress-Archive -Path $nodeFolder -DestinationPath deepspeech-windows-x64-node-v137.zip -Force
            $out = 'deepspeech-windows-x64-node-v137.zip'
          } else {
            Compress-Archive -Path $bindingRoot -DestinationPath deepspeech-windows-x64.zip -Force
            $out = 'deepspeech-windows-x64.zip'
          }
          Write-Output "Packaged $out"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepspeech-windows-x64
          path: |
            deepspeech-windows-x64-node-v137.zip
            deepspeech-windows-x64.zip

  build-macos:
    name: Build macOS (arm64 recommended)
    # Use macos-14 hosted runner if available; for guaranteed arm64 you may use a self-hosted apple-silicon runner labeled 'macos-arm64'
    runs-on: macos-14
    env:
      ELECTRON_VERSION: '35.5.1'
      TARGET_ARCH: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Rebuild deepspeech native binding (macOS)
        run: |
          set -euo pipefail
          echo "ELECTRON_VERSION=$ELECTRON_VERSION"
          echo "TARGET_ARCH=$TARGET_ARCH"
          npm_config_build_from_source=true \
            npm_config_runtime=electron \
            npm_config_target=$ELECTRON_VERSION \
            npm_config_arch=$TARGET_ARCH \
            npm_config_disturl=https://electronjs.org/headers \
            npm rebuild deepspeech --loglevel verbose
          npx electron-rebuild -f -w deepspeech --version $ELECTRON_VERSION || true
      - name: Package artifact
        run: |
          set -euo pipefail
          BINDING_ROOT=node_modules/deepspeech/lib/binding/v0.9.3
          if [ ! -d "$BINDING_ROOT" ]; then echo "Binding root not found: $BINDING_ROOT"; ls -la node_modules/deepspeech || true; exit 1; fi
          if [ -d "$BINDING_ROOT/node-v137" ]; then
            tar czf deepspeech-macos-arm64-node-v137.tgz -C "$BINDING_ROOT" node-v137
          else
            tar czf deepspeech-macos-arm64.tgz -C node_modules/deepspeech/lib/binding v0.9.3
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepspeech-macos-arm64
          path: |
            deepspeech-macos-arm64-node-v137.tgz
            deepspeech-macos-arm64.tgz

# Notes:
# - Trigger this workflow from the Actions UI (Run workflow) or via repository_dispatch.
# - After a successful run, download the artifact from the workflow run page (Actions > Build DeepSpeech > <run> > Artifacts).
# - Extract the artifact into node_modules/deepspeech/lib/binding/v0.9.3 on the target machine so the native addon path matches.
